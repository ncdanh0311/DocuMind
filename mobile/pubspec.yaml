name: documind_mobile
description: A new Flutter project for DocuMind.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  http: ^1.6.0
  flutter_secure_storage: ^10.1.0
  shimmer: ^3.0.0
  app_links: ^7.0.0
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/mascot/
    - assets/decor/clouds/
    - assets/decor/botanical/
    - assets/icons/actions/
    - assets/icons/categories/
    - assets/icons/navigations/
    - assets/icons/utility/
