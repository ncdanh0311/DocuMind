services:
  db:
    image: ankane/pgvector:latest
    container_name: documind-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: documind
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: documind-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL_OVERRIDE=postgresql://postgres:password@db:5432/documind
      - SECRET_KEY=your-secret-key-change-it-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    # Sử dụng command này để hỗ trợ hot-reload khi bạn sửa code
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
