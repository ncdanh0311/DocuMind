model:
  name: "vinai/phobert-base"
  max_length: 256   
  doc_stride: 64

data:
  train_path: "datasets/cleaned/viquad/train"
  val_path: "datasets/cleaned/viquad/validation"
  test_path: "datasets/cleaned/viquad/test"
  batch_size: 32       
  num_workers: 16

training:
  output_dir: "results/models/phobert_qa"
  num_train_epochs: 10
  learning_rate: 3e-5
  weight_decay: 0.01
  gradient_accumulation_steps: 1
  save_strategy: "epoch"
  evaluation_strategy: "epoch"
  logging_steps: 100
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "eval_f1" 
  early_stopping_patience: 3

evaluation:
  batch_size: 64

bf16: true
seed: 42