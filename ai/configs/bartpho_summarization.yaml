model:
  name: "vinai/bartpho-word-base"
  max_input_length: 512
  max_target_length: 256
data:
  train_path: "datasets/cleaned/vietnews/train"
  val_path: "datasets/cleaned/vietnews/validation"
  test_path: "datasets/cleaned/vietnews/test"
  max_train_samples: 20000
  max_val_samples: 1000
  max_test_samples: 2000
  batch_size: 16          # Tang len 32 cho toc do cuc cao
  num_workers: 16

training:
  output_dir: "results/models/bartpho_summarization"
  num_train_epochs: 10
  learning_rate: 1e-4     # LoRA dung LR cao se hoi tu nhanh hon
  weight_decay: 0.01
  gradient_accumulation_steps: 1 
  save_total_limit: 1
  early_stopping_patience: 2

evaluation:
  batch_size: 16
  predict_with_generate: true

bf16: true
seed: 42